<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Trading App</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    body {
      margin: 0;
      background: #0b0f1a;
      font-family: system-ui, sans-serif;
      color: white;
    }
    header { padding: 20px; text-align: center; }
    input {
      padding: 12px 16px;
      width: 280px;
      border-radius: 12px;
      border: none;
      background: #1f2937;
      color: white;
    }
    .filters {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 15px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      background: #1f2937;
      transition: 0.2s;
    }
    .btn.active {
      background: #00ff9d;
      color: black;
      font-weight: bold;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 15px;
      padding: 20px;
    }
    .card {
      background: #111827;
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    .card:hover { transform: translateY(-6px); }
    .coin { display: flex; align-items: center; gap: 8px; }
    .coin img { width: 28px; }
    .star {
      position: absolute;
      right: 12px;
      top: 12px;
      font-size: 18px;
      cursor: pointer;
    }
    .up { color: #00ff9d; }
    .down { color: #ff4d4d; }

    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-box {
      background: #111827;
      padding: 20px;
      border-radius: 16px;
      width: 95%;
      max-width: 620px;
    }
    .timeframes {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }
</style>
</head>
<body>

<header>
  <h1>Crypto Trading</h1>
  <input id="search" placeholder="Search coin...">
</header>

<div class="filters">
  <div class="btn active" onclick="sortBy('top')">Top</div>
  <div class="btn" onclick="sortBy('gainers')">Gainers</div>
  <div class="btn" onclick="sortBy('losers')">Losers</div>
  <div class="btn" onclick="showFavorites()">Favorites ⭐</div>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box" onclick="event.stopImmediatePropagation()">
    <div class="timeframes">
      <div class="btn active" data-days="1" onclick="changeDays(1)">1D</div>
      <div class="btn" data-days="7" onclick="changeDays(7)">7D</div>
      <div class="btn" data-days="30" onclick="changeDays(30)">30D</div>
    </div>
    <canvas id="chart" height="280"></canvas>
  </div>
</div>

<script>
let coins = [], filtered = [], favorites = JSON.parse(localStorage.getItem("fav")) || [];
let chartInstance = null;
let currentCoin = null;
let currentDays = 7;

/* ==================== LOAD DATA ==================== */
async function loadCrypto() {
  try {
    const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&per_page=100&sparkline=false");
    coins = await res.json();
    filtered = coins;
    render();
  } catch(e) {
    console.error(e);
  }
}

/* ==================== RENDER ==================== */
function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  filtered.forEach(c => {
    const change = c.price_change_percentage_24h || 0;
    const isFav = favorites.includes(c.id);

    const card = document.createElement("div");
    card.className = "card";
    card.style.position = "relative";

    card.innerHTML = `
      <div class="star">${isFav ? "⭐" : "☆"}</div>
      <div class="coin">
        <img src="${c.image}" alt="${c.name}">
        <strong>${c.symbol.toUpperCase()}</strong>
      </div>
      <div>$${c.current_price.toLocaleString()}</div>
      <div class="${change >= 0 ? 'up' : 'down'}">
        ${change.toFixed(2)}%
      </div>
    `;

    card.onclick = () => openChart(c);
    card.querySelector(".star").onclick = (e) => {
      e.stopPropagation();
      toggleFav(c.id);
    };

    grid.appendChild(card);
  });
}

/* ==================== FAVORITES & SORT ==================== */
function toggleFav(id) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(x => x !== id);
  } else {
    favorites.push(id);
  }
  localStorage.setItem("fav", JSON.stringify(favorites));
  render();
}

function showFavorites() {
  filtered = coins.filter(c => favorites.includes(c.id));
  render();
}

function sortBy(type) {
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  
  if (type === "gainers") {
    filtered = [...coins].sort((a,b) => (b.price_change_percentage_24h || 0) - (a.price_change_percentage_24h || 0));
  } else if (type === "losers") {
    filtered = [...coins].sort((a,b) => (a.price_change_percentage_24h || 0) - (b.price_change_percentage_24h || 0));
  } else {
    filtered = [...coins];
  }
  render();
}

/* ==================== SEARCH ==================== */
document.getElementById("search").addEventListener("input", e => {
  const v = e.target.value.toLowerCase();
  filtered = coins.filter(c => 
    c.name.toLowerCase().includes(v) || 
    c.symbol.toLowerCase().includes(v)
  );
  render();
});

/* ==================== CHART ==================== */
async function openChart(coin) {
  currentCoin = coin;
  document.getElementById("modal").style.display = "flex";
  await loadChart();
}

async function loadChart() {
  if (!currentCoin) return;

  try {
    const res = await fetch(
      `https://api.coingecko.com/api/v3/coins/${currentCoin.id}/market_chart?vs_currency=usd&days=${currentDays}&interval=${currentDays === 1 ? 'hourly' : 'daily'}`
    );
    const data = await res.json();

    const prices = data.prices.map(p => p[1]);
    const labels = data.prices.map(p => new Date(p[0]).toLocaleDateString('ru-RU'));

    const ctx = document.getElementById("chart");

    if (chartInstance) chartInstance.destroy();

    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: currentCoin.name,
          data: prices,
          borderColor: '#00ff9d',
          backgroundColor: 'rgba(0, 255, 157, 0.1)',
          tension: 0.3,
          borderWidth: 2
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: '#334155' } },
          y: { grid: { color: '#334155' } }
        }
      }
    });
  } catch(e) {
    console.error(e);
  }
}

function changeDays(days) {
  currentDays = days;
  
  // Активная кнопка
  document.querySelectorAll('.timeframes .btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.getAttribute('data-days')) === days);
  });

  loadChart();
}

/* Close modal only when clicking outside modal-box */
document.getElementById("modal").addEventListener("click", (e) => {
  if (e.target.id === "modal") {
    document.getElementById("modal").style.display = "none";
  }
});

loadCrypto();
setInterval(loadCrypto, 90000); // обновление каждые 1.5 минуты
</script>
</body>
</html>
