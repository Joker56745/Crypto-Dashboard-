<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Courses</title>
<style>
  body {
    margin: 0;
    background: #0b0f1a;
    color: #fff;
    font-family: system-ui, sans-serif;
  }

  header {
    padding: 25px;
    text-align: center;
    background: #111827;
  }

  input {
    padding: 12px 16px;
    width: 280px;
    border-radius: 12px;
    border: none;
    background: #1f2937;
    color: white;
    margin-top: 10px;
  }

  .filters {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 20px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    background: #1f2937;
    user-select: none;
  }

  .btn.active {
    background: #00ff9d;
    color: black;
    font-weight: bold;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    padding: 20px;
  }

  .card {
    background: #111827;
    border-radius: 14px;
    padding: 16px;
    cursor: pointer;
    transition: 0.2s;
  }

  .card:hover {
    transform: translateY(-6px);
  }

  .tag {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 8px;
    font-size: 12px;
    background: #1f2937;
    margin-top: 8px;
  }

  .level {
    color: #00ff9d;
    font-weight: bold;
  }

  .modal {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .modal-box {
    background: #111827;
    padding: 25px;
    border-radius: 16px;
    width: 100%;
    max-width: 700px;
    position: relative;
  }

  .close {
    position: absolute;
    top: 10px;
    right: 16px;
    font-size: 32px;
    cursor: pointer;
    color: #ccc;
  }

  .lesson {
    background: #1f2937;
    padding: 12px;
    border-radius: 10px;
    margin-top: 10px;
  }
</style>
</head>
<body>

<header>
  <h1>Crypto Courses</h1>
  <input id="search" placeholder="Поиск курса...">
</header>

<div class="filters">
  <div class="btn active" onclick="filterLevel('all')">Все</div>
  <div class="btn" onclick="filterLevel('beginner')">Начинающий</div>
  <div class="btn" onclick="filterLevel('middle')">Средний</div>
  <div class="btn" onclick="filterLevel('pro')">Профи</div>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="close" onclick="closeModal()">×</div>
    <h2 id="title"></h2>
    <p id="desc"></p>
    <div id="lessons"></div>
  </div>
</div>

<script>
const courses = [
  {
    id: 1,
    title: "Основы криптовалют",
    level: "beginner",
    desc: "Базовый курс о блокчейне и крипте",
    lessons: ["Что такое блокчейн", "Bitcoin", "Как хранить крипту"]
  },
  {
    id: 2,
    title: "Трейдинг криптой",
    level: "middle",
    desc: "Учимся торговать на бирже",
    lessons: ["Графики", "Свечи", "Риск-менеджмент"]
  },
  {
    id: 3,
    title: "DeFi и стейкинг",
    level: "pro",
    desc: "Продвинутые финансы в блокчейне",
    lessons: ["DeFi протоколы", "Yield farming", "Стейкинг"]
  }
];

let filtered = courses;

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  filtered.forEach(c => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <h3>${c.title}</h3>
      <div class="tag level">${c.level}</div>
      <p>${c.desc}</p>
    `;
    card.onclick = () => openModal(c);
    grid.appendChild(card);
  });
}

function filterLevel(level) {
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  filtered = level === 'all' ? courses : courses.filter(c => c.level === level);
  render();
}

document.getElementById("search").addEventListener("input", e => {
  const v = e.target.value.toLowerCase();
  filtered = courses.filter(c => c.title.toLowerCase().includes(v));
  render();
});

function openModal(course) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("title").textContent = course.title;
  document.getElementById("desc").textContent = course.desc;

  const lessons = document.getElementById("lessons");
  lessons.innerHTML = "";

  course.lessons.forEach(l => {
    const div = document.createElement("div");
    div.className = "lesson";
    div.textContent = l;
    lessons.appendChild(div);
  });
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

render();
</script>

</body>
</html>
