<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Trading Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  background: #0b0f1a;
  font-family: system-ui;
  color: white;
}

/* HEADER */
header {
  padding: 20px;
  text-align: center;
}

input {
  padding: 12px;
  width: 250px;
  border-radius: 10px;
  border: none;
  outline: none;
  margin-top: 10px;
}

/* TOP SECTION */
.top {
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

.top div {
  width: 45%;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* CARD */
.card {
  background: #111827;
  border-radius: 16px;
  padding: 15px;
  cursor: pointer;
  position: relative;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

/* COIN */
.coin {
  display: flex;
  align-items: center;
  gap: 10px;
}

.coin img {
  width: 26px;
}

/* COLORS */
.up { color: #00ff9d; }
.down { color: #ff4d4d; }

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.8);
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #111827;
  padding: 20px;
  border-radius: 16px;
  width: 90%;
  max-width: 500px;
}
</style>
</head>

<body>

<header>
  <h1>Crypto Trading</h1>
  <input id="search" placeholder="Search...">
</header>

<div class="top">
  <div>
    <h3>🟢 Top Gainers</h3>
    <div id="gainers"></div>
  </div>
  <div>
    <h3>🔴 Top Losers</h3>
    <div id="losers"></div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>

let coins = [];
let chart;

/* загрузка */
async function loadCrypto(){
  const res = await fetch(
    "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&per_page=50"
  );
  coins = await res.json();

  render(coins);
  renderTop();
}

/* карточки */
function render(data){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(c => {

    const card = document.createElement("div");
    card.className = "card";

    const change = c.price_change_percentage_24h;

    card.innerHTML = `
      <div class="coin">
        <img src="${c.image}">
        <strong>${c.symbol.toUpperCase()}</strong>
      </div>
      <div>$${c.current_price}</div>
      <div class="${change>=0?'up':'down'}">${change.toFixed(2)}%</div>
    `;

    card.onclick = () => openChart(c.id);

    grid.appendChild(card);
  });
}

/* топ */
function renderTop(){
  const sorted = [...coins].sort((a,b)=>b.price_change_percentage_24h - a.price_change_percentage_24h);

  const gainers = sorted.slice(0,5);
  const losers = sorted.slice(-5).reverse();

  document.getElementById("gainers").innerHTML =
    gainers.map(c => `<p>${c.symbol.toUpperCase()} ${c.price_change_percentage_24h.toFixed(1)}%</p>`).join("");

  document.getElementById("losers").innerHTML =
    losers.map(c => `<p>${c.symbol.toUpperCase()} ${c.price_change_percentage_24h.toFixed(1)}%</p>`).join("");
}

/* график */
async function openChart(id){
  const res = await fetch(
    `https://api.coingecko.com/api/v3/coins/${id}/market_chart?vs_currency=usd&days=7`
  );
  const data = await res.json();

  const prices = data.prices.map(p => p[1]);
  const labels = data.prices.map(p => new Date(p[0]).toLocaleDateString());

  document.getElementById("modal").style.display = "flex";

  const ctx = document.getElementById("chart");

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: prices,
        borderColor: '#00ff9d',
        tension: 0.3
      }]
    },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { display: false },
        y: { display: true }
      }
    }
  });
}

/* поиск */
document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();
  const filtered = coins.filter(c =>
    c.name.toLowerCase().includes(val) ||
    c.symbol.toLowerCase().includes(val)
  );
  render(filtered);
});

/* закрытие модалки */
document.getElementById("modal").onclick = () => {
  document.getElementById("modal").style.display = "none";
};

loadCrypto();
setInterval(loadCrypto, 60000);

</script>

</body>
</html>
