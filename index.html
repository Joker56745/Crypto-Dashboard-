<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoPulse</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
    :root { --bg: #0a0e17; --card: #111827; --accent: #00ff9d; }
    body {
        margin: 0;
        background: var(--bg);
        color: #e0e0e0;
        font-family: system-ui, sans-serif;
    }
    header {
        background: #0f172a;
        padding: 20px 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 15px;
    }
    .logo { font-size: 28px; font-weight: 800; color: #00ff9d; }
    input {
        padding: 14px 20px;
        width: 340px;
        border-radius: 9999px;
        border: none;
        background: #1e2937;
        color: white;
    }
    .filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: 15px 30px;
        background: #0f172a;
    }
    .btn {
        padding: 9px 20px;
        border-radius: 9999px;
        cursor: pointer;
        background: #1e2937;
    }
    .btn.active, .btn:hover { background: var(--accent); color: black; }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 18px;
        padding: 25px;
    }
    .card {
        background: var(--card);
        border-radius: 20px;
        padding: 18px;
        transition: all 0.3s;
        position: relative;
    }
    .card:hover { transform: translateY(-8px); }

    .coin-info { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
    .coin-info img { width: 42px; height: 42px; }
    .sparkline { height: 60px; margin: 10px 0; }
    .price { font-size: 22px; font-weight: 700; }
    .change { padding: 4px 12px; border-radius: 9999px; font-size: 14px; font-weight: 600; }
    .up { color: #00ff9d; background: rgba(0,255,157,0.1); }
    .down { color: #ff4d4d; background: rgba(255,77,77,0.1); }
    .star { position: absolute; top: 16px; right: 16px; font-size: 22px; cursor: pointer; }

    .error { text-align: center; padding: 80px 20px; color: #ff4d4d; font-size: 18px; }
    .loading { text-align: center; padding: 80px; color: #888; }
</style>
</head>
<body>

<header>
    <div class="logo">CryptoPulse</div>
    <input id="search" placeholder="Поиск монеты...">
</header>

<div class="filters">
    <div class="btn active" data-filter="all">Все</div>
    <div class="btn" data-filter="gainers">Растут</div>
    <div class="btn" data-filter="losers">Падают</div>
    <div class="btn" data-filter="trending">🔥 Trending</div>
    <div class="btn" data-filter="favorites">⭐ Избранное</div>
</div>

<div id="grid" class="grid"></div>

<!-- MODAL (оставил упрощённый, чтобы не перегружать) -->
<div class="modal" id="modal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;justify-content:center;align-items:flex-start;z-index:1000;padding:40px 20px;overflow-y:auto;">
    <div class="modal-box" style="background:#0f172a;width:100%;max-width:820px;border-radius:24px;padding:30px;position:relative;">
        <span onclick="closeModal()" style="position:absolute;top:20px;right:25px;font-size:42px;cursor:pointer;color:#666;">×</span>
        <div class="modal-header" style="display:flex;align-items:center;gap:16px;margin-bottom:20px;">
            <img id="modalImage" src="" width="56" height="56">
            <div>
                <h2 id="modalTitle"></h2>
                <p id="modalSymbol" style="color:#888;"></p>
            </div>
        </div>
        <div class="modal-price" id="modalPrice" style="font-size:36px;font-weight:700;"></div>
        <div class="chart-container" style="height:420px;margin:25px 0;position:relative;">
            <canvas id="chart"></canvas>
        </div>
    </div>
</div>

<script>
let allCoins = [];
let filteredCoins = [];
let favorites = JSON.parse(localStorage.getItem("cryptoFavorites")) || [];
let chartInstance = null;
let currentCoin = null;

const grid = document.getElementById("grid");

async function loadCrypto() {
    grid.innerHTML = `<div class="loading">Загрузка данных с CoinGecko...</div>`;

    try {
        const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=150&page=1&price_change_percentage=24h");
        if (!res.ok) throw new Error("Rate limit или ошибка API");

        allCoins = await res.json();
        filteredCoins = [...allCoins];
        renderGrid();
    } catch (e) {
        console.error(e);
        grid.innerHTML = `<div class="error">Ошибка загрузки данных.<br>Подождите 30–60 секунд и обновите страницу (F5).</div>`;
    }
}

function renderGrid() {
    grid.innerHTML = "";

    filteredCoins.slice(0, 100).forEach(coin => {
        const change = coin.price_change_percentage_24h || 0;
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="star">${favorites.includes(coin.id) ? '⭐' : '☆'}</div>
            <div class="coin-info">
                <img src="${coin.image}">
                <div>
                    <strong>${coin.symbol.toUpperCase()}</strong><br>
                    <small>${coin.name}</small>
                </div>
            </div>
            <div class="price">$${coin.current_price.toLocaleString('ru-RU')}</div>
            <div class="change ${change >= 0 ? 'up' : 'down'}">${change.toFixed(2)}%</div>
        `;

        card.onclick = (e) => {
            if (!e.target.closest('.star')) openModal(coin);
        };
        card.querySelector('.star').onclick = (e) => {
            e.stopPropagation();
            toggleFavorite(coin.id);
        };

        grid.appendChild(card);
    });
}

function toggleFavorite(id) {
    if (favorites.includes(id)) favorites = favorites.filter(x => x !== id);
    else favorites.push(id);
    localStorage.setItem("cryptoFavorites", JSON.stringify(favorites));
    renderGrid();
}

async function openModal(coin) {
    currentCoin = coin;
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalImage").src = coin.image;
    document.getElementById("modalTitle").textContent = coin.name;
    document.getElementById("modalSymbol").textContent = coin.symbol.toUpperCase();

    const change = coin.price_change_percentage_24h || 0;
    document.getElementById("modalPrice").innerHTML = `$${coin.current_price.toLocaleString('ru-RU')} <span class="${change >= 0 ? 'up' : 'down'}">(${change.toFixed(2)}%)</span>`;

    if (chartInstance) chartInstance.destroy();
    await loadSimpleChart(coin.id);
}

async function loadSimpleChart(coinId) {
    try {
        const res = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=7`);
        const data = await res.json();
        
        chartInstance = new Chart(document.getElementById("chart"), {
            type: 'line',
            data: {
                labels: data.prices.map(() => ''),
                datasets: [{
                    data: data.prices.map(p => p[1]),
                    borderColor: '#00ff9d',
                    borderWidth: 3,
                    tension: 0.3,
                    pointRadius: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }} }
        });
    } catch(e) { console.error(e); }
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
    if (chartInstance) chartInstance.destroy();
}

// Фильтры и поиск
document.querySelectorAll('.filters .btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filters .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const filter = btn.dataset.filter;
        if (filter === 'all') filteredCoins = [...allCoins];
        else if (filter === 'gainers') filteredCoins = [...allCoins].sort((a,b) => (b.price_change_percentage_24h||0) - (a.price_change_percentage_24h||0));
        else if (filter === 'losers') filteredCoins = [...allCoins].sort((a,b) => (a.price_change_percentage_24h||0) - (b.price_change_percentage_24h||0));
        else if (filter === 'favorites') filteredCoins = allCoins.filter(c => favorites.includes(c.id));
        else if (filter === 'trending') filteredCoins = [...allCoins].slice(0, 50);

        renderGrid();
    });
});

document.getElementById("search").addEventListener("input", e => {
    const term = e.target.value.toLowerCase();
    filteredCoins = allCoins.filter(c => c.name.toLowerCase().includes(term) || c.symbol.toLowerCase().includes(term));
    renderGrid();
});

document.getElementById("modal").addEventListener("click", e => {
    if (e.target.id === "modal") closeModal();
});

// Запуск
loadCrypto();
setInterval(loadCrypto, 240000); // каждые 4 минуты
</script>
</body>
</html>
