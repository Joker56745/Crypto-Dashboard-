<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoPulse — Курсы Криптовалют</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
    :root {
        --bg: #0a0e17;
        --card: #111827;
        --accent: #00ff9d;
    }
    body {
        margin: 0;
        background: var(--bg);
        color: #e0e0e0;
        font-family: 'Inter', system-ui, sans-serif;
    }
    header {
        background: #0f172a;
        padding: 20px 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 15px;
        border-bottom: 1px solid #1e2937;
    }
    .logo {
        font-size: 28px;
        font-weight: 800;
        background: linear-gradient(90deg, #00ff9d, #00b36b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    input {
        padding: 14px 20px;
        width: 320px;
        border-radius: 9999px;
        border: none;
        background: #1e2937;
        color: white;
        font-size: 16px;
    }
    .filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: 15px 30px;
        background: #0f172a;
    }
    .btn {
        padding: 9px 20px;
        border-radius: 9999px;
        cursor: pointer;
        background: #1e2937;
        transition: all 0.2s;
        font-weight: 500;
    }
    .btn.active, .btn:hover {
        background: var(--accent);
        color: black;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 18px;
        padding: 25px;
    }
    .card {
        background: var(--card);
        border-radius: 20px;
        padding: 18px;
        transition: all 0.3s;
        position: relative;
    }
    .card:hover { transform: translateY(-8px); }

    .coin-info { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
    .coin-info img { width: 42px; height: 42px; }
    .sparkline { height: 60px; margin: 10px 0; }
    .price { font-size: 22px; font-weight: 700; }
    .change { padding: 4px 12px; border-radius: 9999px; font-size: 14px; font-weight: 600; }
    .up { color: #00ff9d; background: rgba(0,255,157,0.1); }
    .down { color: #ff4d4d; background: rgba(255,77,77,0.1); }
    .star { position: absolute; top: 16px; right: 16px; font-size: 22px; cursor: pointer; }

    /* ==================== MODAL ==================== */
    .modal {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.95);
        display: none;
        justify-content: center;
        align-items: flex-start;
        z-index: 1000;
        padding: 40px 20px;
        overflow-y: auto;
    }
    .modal-box {
        background: #0f172a;
        width: 100%;
        max-width: 820px;
        border-radius: 24px;
        padding: 30px;
        position: relative;
    }
    .close-btn {
        position: absolute;
        top: 20px;
        right: 25px;
        font-size: 42px;
        cursor: pointer;
        color: #666;
    }
    .modal-header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
    }
    .modal-header img {
        width: 56px;
        height: 56px;
    }
    .modal-price {
        font-size: 36px;
        font-weight: 700;
        margin: 10px 0;
    }
    .timeframes {
        display: flex;
        background: #1e2937;
        border-radius: 9999px;
        padding: 4px;
        width: fit-content;
        margin: 20px 0;
    }
    .time-btn {
        padding: 8px 18px;
        border-radius: 9999px;
        cursor: pointer;
        font-size: 14px;
    }
    .time-btn.active {
        background: #00ff9d;
        color: black;
        font-weight: bold;
    }
    .chart-container {
        position: relative;
        height: 420px;
        margin: 25px 0;
    }
    .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
        margin-top: 20px;
    }
    .stat-item {
        background: #1e2937;
        padding: 12px 16px;
        border-radius: 12px;
    }
</style>
</head>
<body>

<header>
    <div class="logo">CryptoPulse</div>
    <input id="search" placeholder="Поиск монеты...">
</header>

<div class="filters">
    <div class="btn active" data-filter="all">Все</div>
    <div class="btn" data-filter="gainers">Растут</div>
    <div class="btn" data-filter="losers">Падают</div>
    <div class="btn" data-filter="trending">🔥 Trending</div>
    <div class="btn" data-filter="favorites">⭐ Избранное</div>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <span class="close-btn" onclick="closeModal()">×</span>
        
        <div class="modal-header">
            <img id="modalImage" src="" alt="">
            <div>
                <h2 id="modalTitle" style="margin:0;"></h2>
                <p id="modalSymbol" style="margin:0; color:#888;"></p>
            </div>
        </div>

        <div class="modal-price" id="modalPrice"></div>

        <div class="timeframes" id="timeframes">
            <div class="time-btn active" data-days="1">1H</div>
            <div class="time-btn" data-days="4">4H</div>
            <div class="time-btn" data-days="1">1D</div>
            <div class="time-btn" data-days="7">1W</div>
            <div class="time-btn" data-days="30">1M</div>
            <div class="time-btn" data-days="365">1Y</div>
        </div>

        <div class="chart-container">
            <canvas id="chart"></canvas>
        </div>

        <div class="stats" id="stats"></div>
    </div>
</div>

<script>
let allCoins = [], filteredCoins = [], favorites = JSON.parse(localStorage.getItem("cryptoFavorites")) || [];
let chartInstance = null;
let currentCoin = null;
let currentDays = 1;

async function loadCrypto() {
    try {
        const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1&sparkline=true&price_change_percentage=1h,24h,7d");
        allCoins = await res.json();
        filteredCoins = [...allCoins];
        renderGrid();
    } catch(e) { console.error(e); }
}

function renderGrid() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    filteredCoins.slice(0, 100).forEach(coin => {
        const change = coin.price_change_percentage_24h || 0;
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="star">${favorites.includes(coin.id) ? '⭐' : '☆'}</div>
            <div class="coin-info">
                <img src="${coin.image}">
                <div>
                    <strong>${coin.symbol.toUpperCase()}</strong><br>
                    <small>${coin.name}</small>
                </div>
            </div>
            <div class="price">$${coin.current_price.toLocaleString('ru-RU')}</div>
            <div class="change ${change >= 0 ? 'up' : 'down'}">${change.toFixed(2)}%</div>
            <canvas class="sparkline" width="260" height="60"></canvas>
        `;

        card.onclick = (e) => { if (!e.target.closest('.star')) openModal(coin); };
        card.querySelector('.star').onclick = (e) => { e.stopPropagation(); toggleFavorite(coin.id); };

        grid.appendChild(card);

        setTimeout(() => {
            const sparkCanvas = card.querySelector('.sparkline');
            if (sparkCanvas && coin.sparkline_in_7d) drawSparkline(sparkCanvas, coin.sparkline_in_7d.price);
        }, 100);
    });
}

function drawSparkline(canvas, data) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.beginPath();
    const min = Math.min(...data), max = Math.max(...data), range = max - min || 1;
    for (let i = 0; i < data.length; i++) {
        const x = (i / (data.length - 1)) * w;
        const y = h - ((data[i] - min) / range) * (h * 0.85);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.strokeStyle = '#00ff9d';
    ctx.lineWidth = 2.5;
    ctx.stroke();
}

function toggleFavorite(id) {
    favorites = favorites.includes(id) ? favorites.filter(x => x !== id) : [...favorites, id];
    localStorage.setItem("cryptoFavorites", JSON.stringify(favorites));
    renderGrid();
}

async function openModal(coin) {
    currentCoin = coin;
    document.getElementById("modal").style.display = "flex";

    document.getElementById("modalImage").src = coin.image;
    document.getElementById("modalTitle").textContent = coin.name;
    document.getElementById("modalSymbol").textContent = coin.symbol.toUpperCase();

    const change = coin.price_change_percentage_24h || 0;
    document.getElementById("modalPrice").innerHTML = `
        $${coin.current_price.toLocaleString('ru-RU')}
        <span class="${change >= 0 ? 'up' : 'down'}" style="font-size:24px;"> (${change.toFixed(2)}%)</span>
    `;

    updateStats(coin);
    if (chartInstance) chartInstance.destroy();
    await loadChart(coin.id, currentDays);
}

function updateStats(coin) {
    document.getElementById("stats").innerHTML = `
        <div class="stat-item"><strong>Rank</strong><br>#${coin.market_cap_rank || '—'}</div>
        <div class="stat-item"><strong>Market Cap</strong><br>$${(coin.market_cap/1e9).toFixed(2)}B</div>
        <div class="stat-item"><strong>24h Volume</strong><br>$${(coin.total_volume/1e9).toFixed(2)}B</div>
        <div class="stat-item"><strong>ATH</strong><br>$${coin.ath ? coin.ath.toLocaleString('ru-RU') : '—'}</div>
    `;
}

async function loadChart(coinId, days) {
    try {
        const res = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=${days}&interval=${days > 30 ? 'daily' : 'hourly'}`);
        const data = await res.json();

        chartInstance = new Chart(document.getElementById("chart"), {
            type: 'line',
            data: {
                labels: data.prices.map(p => new Date(p[0]).toLocaleString('ru-RU', {hour: '2-digit', minute:'2-digit'})),
                datasets: [{
                    data: data.prices.map(p => p[1]),
                    borderColor: '#00ff9d',
                    borderWidth: 3,
                    tension: 0.3,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#334155' }, ticks: { color: '#aaa' } },
                    x: { grid: { color: '#334155' }, ticks: { color: '#aaa', maxTicksLimit: 12 } }
                }
            }
        });
    } catch(e) { console.error(e); }
}

// Таймфреймы
document.getElementById("timeframes").addEventListener("click", (e) => {
    if (!e.target.classList.contains('time-btn')) return;
    
    document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
    e.target.classList.add('active');
    
    currentDays = parseInt(e.target.dataset.days);
    if (currentCoin) {
        if (chartInstance) chartInstance.destroy();
        loadChart(currentCoin.id, currentDays);
    }
});

function closeModal() {
    document.getElementById("modal").style.display = "none";
    if (chartInstance) chartInstance.destroy();
}

// Фильтры и поиск
document.querySelectorAll('.filters .btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filters .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const f = btn.dataset.filter;
        if (f === 'all') filteredCoins = [...allCoins];
        else if (f === 'gainers') filteredCoins = [...allCoins].sort((a,b) => (b.price_change_percentage_24h||0) - (a.price_change_percentage_24h||0));
        else if (f === 'losers') filteredCoins = [...allCoins].sort((a,b) => (a.price_change_percentage_24h||0) - (b.price_change_percentage_24h||0));
        else if (f === 'favorites') filteredCoins = allCoins.filter(c => favorites.includes(c.id));
        else if (f === 'trending') filteredCoins = [...allCoins].slice(0, 60);
        
        renderGrid();
    });
});

document.getElementById("search").addEventListener("input", e => {
    const term = e.target.value.toLowerCase();
    filteredCoins = allCoins.filter(c => c.name.toLowerCase().includes(term) || c.symbol.toLowerCase().includes(term));
    renderGrid();
});

document.getElementById("modal").addEventListener("click", e => {
    if (e.target.id === "modal") closeModal();
});

loadCrypto();
setInterval(loadCrypto, 120000);
</script>
</body>
</html>
