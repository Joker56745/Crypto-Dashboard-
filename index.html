<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoPulse — Курсы Криптовалют</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
    :root {
        --bg: #0a0e17;
        --card: #111827;
        --accent: #00ff9d;
    }
    body {
        margin: 0;
        background: var(--bg);
        color: #e0e0e0;
        font-family: 'Inter', system-ui, sans-serif;
    }
    header {
        background: #0f172a;
        padding: 20px 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 15px;
        border-bottom: 1px solid #1e2937;
    }
    .logo {
        font-size: 28px;
        font-weight: 800;
        background: linear-gradient(90deg, #00ff9d, #00b36b);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    input {
        padding: 14px 20px;
        width: 320px;
        border-radius: 9999px;
        border: none;
        background: #1e2937;
        color: white;
        font-size: 16px;
    }
    .filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        padding: 15px 30px;
        background: #0f172a;
    }
    .btn {
        padding: 9px 20px;
        border-radius: 9999px;
        cursor: pointer;
        background: #1e2937;
        transition: all 0.2s;
        font-weight: 500;
    }
    .btn.active, .btn:hover {
        background: var(--accent);
        color: black;
        transform: translateY(-2px);
    }
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 18px;
        padding: 25px;
    }
    .card {
        background: var(--card);
        border-radius: 20px;
        padding: 18px;
        transition: all 0.3s;
        position: relative;
        overflow: hidden;
    }
    .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 25px -5px rgba(0, 255, 157, 0.1);
    }
    .coin-info {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 12px;
    }
    .coin-info img {
        width: 42px;
        height: 42px;
    }
    .sparkline {
        height: 60px;
        margin: 10px 0;
    }
    .price {
        font-size: 22px;
        font-weight: 700;
    }
    .change {
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 9999px;
        font-size: 14px;
        display: inline-block;
    }
    .up { color: #00ff9d; background: rgba(0,255,157,0.1); }
    .down { color: #ff4d4d; background: rgba(255,77,77,0.1); }
    .star {
        position: absolute;
        top: 16px;
        right: 16px;
        font-size: 22px;
        cursor: pointer;
        z-index: 10;
    }

    /* Modal */
    .modal {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.96);
        display: none;
        justify-content: center;
        align-items: flex-start;
        z-index: 1000;
        padding-top: 5vh;
        overflow-y: auto;
    }
    .modal-box {
        background: #111827;
        width: 100%;
        max-width: 780px;
        border-radius: 24px;
        padding: 30px;
        position: relative;
        max-height: 92vh;
        overflow-y: auto;
    }
    .close-btn {
        position: absolute;
        top: 20px;
        right: 25px;
        font-size: 40px;
        cursor: pointer;
        color: #888;
    }
    .chart-container {
        position: relative;
        height: 420px;
        width: 100%;
        margin-top: 20px;
    }
</style>
</head>
<body>

<header>
    <div class="logo">CryptoPulse</div>
    <input id="search" placeholder="Поиск монеты...">
</header>

<div class="filters">
    <div class="btn active" data-filter="all">Все</div>
    <div class="btn" data-filter="gainers">Растут</div>
    <div class="btn" data-filter="losers">Падают</div>
    <div class="btn" data-filter="trending">🔥 Trending</div>
    <div class="btn" data-filter="favorites">⭐ Избранное</div>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <span class="close-btn" onclick="closeModal()">×</span>
        
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:10px;">
            <img id="modalImage" src="" width="48" height="48" style="border-radius:50%;">
            <div>
                <h2 id="modalTitle" style="margin:0;"></h2>
                <p id="modalSymbol" style="margin:0; color:#888; font-weight:500;"></p>
            </div>
        </div>
        
        <p id="modalPrice" style="font-size: 32px; margin: 8px 0 20px 0; font-weight:700;"></p>
        
        <div id="modalChanges" style="display:flex; gap:15px; margin-bottom:25px;"></div>
        
        <div style="margin:20px 0 15px 0; font-weight:500;">График цены</div>
        <div class="chart-container">
            <canvas id="chart"></canvas>
        </div>
    </div>
</div>

<script>
let allCoins = [];
let filteredCoins = [];
let favorites = JSON.parse(localStorage.getItem("cryptoFavorites")) || [];
let chartInstance = null;
let currentCoin = null;
let currentDays = 7;

async function loadCrypto() {
    try {
        const res = await fetch(
            "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1&sparkline=true&price_change_percentage=1h,24h,7d"
        );
        allCoins = await res.json();
        filteredCoins = [...allCoins];
        renderGrid();
    } catch(e) {
        console.error(e);
    }
}

function renderGrid() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    filteredCoins.slice(0, 100).forEach(coin => {
        const change24h = coin.price_change_percentage_24h || 0;
        const isFav = favorites.includes(coin.id);

        const card = document.createElement("div");
        card.className = "card";
        
        card.innerHTML = `
            <div class="star">${isFav ? '⭐' : '☆'}</div>
            <div class="coin-info">
                <img src="${coin.image}" alt="${coin.name}">
                <div>
                    <strong>${coin.symbol.toUpperCase()}</strong><br>
                    <small>${coin.name}</small>
                </div>
            </div>
            <div class="price">$${coin.current_price.toLocaleString('ru-RU')}</div>
            <div class="change ${change24h >= 0 ? 'up' : 'down'}">
                ${change24h.toFixed(2)}% (24ч)
            </div>
            <canvas class="sparkline" width="260" height="60"></canvas>
        `;

        card.onclick = (e) => {
            if (!e.target.closest('.star')) openModal(coin);
        };

        card.querySelector('.star').onclick = (e) => {
            e.stopPropagation();
            toggleFavorite(coin.id);
        };

        grid.appendChild(card);

        // Sparkline
        setTimeout(() => {
            const canvas = card.querySelector('.sparkline');
            const sparkData = coin.sparkline_in_7d?.price || [];
            if (canvas && sparkData.length > 0) drawSparkline(canvas, sparkData);
        }, 100);
    });
}

function drawSparkline(canvas, data) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;
    
    ctx.clearRect(0, 0, w, h);
    ctx.beginPath();
    
    const min = Math.min(...data);
    const max = Math.max(...data);
    const range = max - min || 1;

    for (let i = 0; i < data.length; i++) {
        const x = (i / (data.length - 1)) * w;
        const y = h - ((data[i] - min) / range) * (h * 0.9);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }

    ctx.strokeStyle = '#00ff9d';
    ctx.lineWidth = 2.5;
    ctx.stroke();
}

function toggleFavorite(id) {
    if (favorites.includes(id)) {
        favorites = favorites.filter(x => x !== id);
    } else {
        favorites.push(id);
    }
    localStorage.setItem("cryptoFavorites", JSON.stringify(favorites));
    renderGrid();
}

async function openModal(coin) {
    currentCoin = coin;
    const modal = document.getElementById("modal");
    modal.style.display = "flex";

    document.getElementById("modalImage").src = coin.image;
    document.getElementById("modalTitle").textContent = coin.name;
    document.getElementById("modalSymbol").textContent = coin.symbol.toUpperCase();
    
    const change24h = coin.price_change_percentage_24h || 0;
    document.getElementById("modalPrice").innerHTML = `
        $${coin.current_price.toLocaleString('ru-RU')} 
        <span class="${change24h >= 0 ? 'up' : 'down'}" style="font-size:22px;">
            (${change24h.toFixed(2)}%)
        </span>
    `;

    if (chartInstance) {
        chartInstance.destroy();
        chartInstance = null;
    }

    await loadChart(coin.id);
}

async function loadChart(coinId) {
    try {
        const res = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=${currentDays}`);
        const data = await res.json();
        
        const ctx = document.getElementById("chart");
        
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: data.prices.map(p => new Date(p[0]).toLocaleDateString('ru-RU')),
                datasets: [{
                    label: 'Цена (USD)',
                    data: data.prices.map(p => p[1]),
                    borderColor: '#00ff9d',
                    borderWidth: 3,
                    tension: 0.35,
                    pointRadius: 0,
                    pointHoverRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', maxTicksLimit: 10 } }
                }
            }
        });
    } catch(e) {
        console.error(e);
    }
}

function changeDays(days) {
    currentDays = days;
    document.querySelectorAll('.timeframes .btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    if (currentCoin) loadChart(currentCoin.id);
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
    if (chartInstance) {
        chartInstance.destroy();
        chartInstance = null;
    }
}

// Фильтры
document.querySelectorAll('.filters .btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filters .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const filter = btn.dataset.filter;

        if (filter === 'all') filteredCoins = [...allCoins];
        else if (filter === 'gainers') filteredCoins = [...allCoins].sort((a,b) => (b.price_change_percentage_24h||0) - (a.price_change_percentage_24h||0));
        else if (filter === 'losers') filteredCoins = [...allCoins].sort((a,b) => (a.price_change_percentage_24h||0) - (b.price_change_percentage_24h||0));
        else if (filter === 'favorites') filteredCoins = allCoins.filter(c => favorites.includes(c.id));
        else if (filter === 'trending') filteredCoins = [...allCoins].slice(0, 50);

        renderGrid();
    });
});

document.getElementById("search").addEventListener("input", (e) => {
    const term = e.target.value.toLowerCase();
    filteredCoins = allCoins.filter(c => 
        c.name.toLowerCase().includes(term) || 
        c.symbol.toLowerCase().includes(term)
    );
    renderGrid();
});

document.getElementById("modal").addEventListener("click", (e) => {
    if (e.target.id === "modal") closeModal();
});

// Запуск
loadCrypto();
setInterval(loadCrypto, 120000);
</script>
</body>
</html>
