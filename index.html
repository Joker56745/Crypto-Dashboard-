<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Dashboard</title>

<style>
body {
  margin: 0;
  background: #0b0f1a;
  font-family: system-ui;
  color: white;
}

/* HEADER */
header {
  padding: 20px;
  text-align: center;
}

h1 {
  margin: 0;
  font-weight: 500;
}

/* SEARCH */
.search {
  margin-top: 15px;
}

input {
  padding: 12px;
  width: 250px;
  border-radius: 10px;
  border: none;
  outline: none;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* CARD */
.card {
  background: #111827;
  border-radius: 16px;
  padding: 15px;
  transition: 0.25s;
  cursor: pointer;
  position: relative;
}

.card:hover {
  transform: translateY(-6px);
}

/* COIN (иконка + название) */
.coin {
  display: flex;
  align-items: center;
  gap: 10px;
}

.coin img {
  width: 26px;
  height: 26px;
  border-radius: 50%;
}

/* STAR */
.star {
  position: absolute;
  top: 10px;
  right: 10px;
  cursor: pointer;
  font-size: 18px;
}

/* COLORS */
.up { color: #00ff9d; }
.down { color: #ff4d4d; }

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: #111827;
  padding: 25px;
  border-radius: 16px;
  max-width: 400px;
  width: 90%;
}

.close {
  cursor: pointer;
  float: right;
}
</style>
</head>

<body>

<header>
  <h1>Crypto Dashboard</h1>
  <div class="search">
    <input id="search" placeholder="Search crypto...">
  </div>
</header>

<div class="grid" id="grid"></div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>

let coins = [];
let favorites = JSON.parse(localStorage.getItem("fav")) || [];

async function loadCrypto(){
  const res = await fetch(
    "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=50&page=1"
  );

  coins = await res.json();
  render(coins);
}

function render(data){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(c => {

    const change = c.price_change_percentage_24h;
    const fav = favorites.includes(c.id);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="star">${fav ? "⭐" : "☆"}</div>

      <div class="coin">
        <img src="${c.image}" alt="">
        <strong>${c.symbol.toUpperCase()}</strong>
      </div>

      <div>$${c.current_price}</div>

      <div class="${change>=0?'up':'down'}">
        ${change.toFixed(2)}%
      </div>
    `;

    /* открыть модалку */
    card.onclick = () => openModal(c);

    /* избранное */
    card.querySelector(".star").onclick = (e) => {
      e.stopPropagation();

      if(fav){
        favorites = favorites.filter(id => id !== c.id);
      } else {
        favorites.push(c.id);
      }

      localStorage.setItem("fav", JSON.stringify(favorites));
      render(data);
    };

    grid.appendChild(card);
  });
}

function openModal(c){
  const modal = document.getElementById("modal");
  const content = document.getElementById("modalContent");

  content.innerHTML = `
    <span class="close" onclick="closeModal()">✖</span>
    <h2>${c.name}</h2>
    <p>Price: $${c.current_price}</p>
    <p>Market Cap: $${c.market_cap}</p>
    <p>24h Change: ${c.price_change_percentage_24h.toFixed(2)}%</p>
  `;

  modal.style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
  const value = e.target.value.toLowerCase();
  const filtered = coins.filter(c =>
    c.name.toLowerCase().includes(value) ||
    c.symbol.toLowerCase().includes(value)
  );
  render(filtered);
});

loadCrypto();
setInterval(loadCrypto, 60000);

</script>

</body>
</html>
