<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoPulse</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
    :root { --bg: #0a0e17; --card: #111827; --accent: #00ff9d; }
    body {
        margin: 0;
        background: var(--bg);
        color: #e0e0e0;
        font-family: system-ui, sans-serif;
    }
    header {
        background: #0f172a;
        padding: 25px 30px;
        text-align: center;
        border-bottom: 1px solid #1e2937;
    }
    .logo {
        font-size: 32px;
        font-weight: 800;
        color: #00ff9d;
        margin-bottom: 15px;
    }
    .search-container {
        display: flex;
        justify-content: center;
    }
    input {
        padding: 14px 20px;
        width: 100%;
        max-width: 420px;
        border-radius: 9999px;
        border: none;
        background: #1e2937;
        color: white;
        font-size: 16px;
    }
    .filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
        padding: 15px 30px;
        background: #0f172a;
    }
    .btn {
        padding: 9px 20px;
        border-radius: 9999px;
        cursor: pointer;
        background: #1e2937;
    }
    .btn.active, .btn:hover { background: var(--accent); color: black; }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 18px;
        padding: 25px;
    }
    .card {
        background: var(--card);
        border-radius: 20px;
        padding: 18px;
        transition: all 0.3s;
        position: relative;
        cursor: pointer;
    }
    .card:hover { transform: translateY(-8px); }

    .coin-info { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
    .coin-info img { width: 42px; height: 42px; }
    .price { font-size: 22px; font-weight: 700; }
    .change { padding: 4px 12px; border-radius: 9999px; font-size: 14px; font-weight: 600; }
    .up { color: #00ff9d; background: rgba(0,255,157,0.1); }
    .down { color: #ff4d4d; background: rgba(255,77,77,0.1); }
    .star { position: absolute; top: 16px; right: 16px; font-size: 22px; cursor: pointer; z-index: 10; }

    /* Modal */
    .modal {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.95);
        display: none;
        justify-content: center;
        align-items: flex-start;
        z-index: 1000;
        padding: 40px 15px;
        overflow-y: auto;
    }
    .modal-box {
        background: #0f172a;
        width: 100%;
        max-width: 860px;
        border-radius: 24px;
        padding: 30px;
        position: relative;
    }
    .close-btn {
        position: absolute;
        top: 20px; right: 25px;
        font-size: 42px;
        cursor: pointer;
        color: #888;
    }
    .modal-header { display: flex; align-items: center; gap: 16px; margin-bottom: 15px; }
    .modal-header img { width: 58px; height: 58px; }
    .modal-price { font-size: 38px; font-weight: 700; margin: 10px 0 20px 0; }
    .timeframes {
        display: flex;
        background: #1e2937;
        border-radius: 50px;
        padding: 5px;
        width: fit-content;
        margin-bottom: 25px;
    }
    .time-btn {
        padding: 8px 20px;
        border-radius: 50px;
        cursor: pointer;
        font-size: 15px;
    }
    .time-btn.active {
        background: #00ff9d;
        color: black;
        font-weight: bold;
    }
    .chart-container {
        position: relative;
        height: 460px;
        width: 100%;
    }
</style>
</head>
<body>

<header>
    <div class="logo">CryptoPulse</div>
    <div class="search-container">
        <input id="search" placeholder="Поиск монеты...">
    </div>
</header>

<div class="filters">
    <div class="btn active" data-filter="all">Все</div>
    <div class="btn" data-filter="gainers">Растут</div>
    <div class="btn" data-filter="losers">Падают</div>
    <div class="btn" data-filter="trending">🔥 Trending</div>
    <div class="btn" data-filter="favorites">⭐ Избранное</div>
</div>

<div id="grid" class="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-box">
        <span class="close-btn" onclick="closeModal()">×</span>
        
        <div class="modal-header">
            <img id="modalImage" src="" alt="">
            <div>
                <h2 id="modalTitle" style="margin:0;"></h2>
                <p id="modalSymbol" style="margin:0; color:#888; font-size:18px;"></p>
            </div>
        </div>

        <div id="modalPrice" class="modal-price"></div>

        <div class="timeframes" id="timeframes">
            <div class="time-btn active" data-days="1">1D</div>
            <div class="time-btn" data-days="7">7D</div>
            <div class="time-btn" data-days="30">30D</div>
            <div class="time-btn" data-days="90">90D</div>
        </div>

        <div class="chart-container">
            <canvas id="chart"></canvas>
        </div>
    </div>
</div>

<script>
let allCoins = [], filteredCoins = [], favorites = JSON.parse(localStorage.getItem("cryptoFavorites")) || [];
let chartInstance = null;
let currentCoin = null;
let currentDays = 1;

const grid = document.getElementById("grid");

async function loadCrypto() {
    grid.innerHTML = `<div style="text-align:center;padding:80px;color:#888;">Загрузка данных...</div>`;
    try {
        const res = await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=150&page=1&price_change_percentage=24h");
        allCoins = await res.json();
        filteredCoins = [...allCoins];
        renderGrid();
    } catch (e) {
        grid.innerHTML = `<div style="text-align:center;padding:80px;color:#ff4d4d;">Ошибка загрузки.<br>Обновите страницу (F5)</div>`;
    }
}

function renderGrid() {
    grid.innerHTML = "";
    filteredCoins.slice(0, 100).forEach(coin => {
        const change = coin.price_change_percentage_24h || 0;
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="star">${favorites.includes(coin.id) ? '⭐' : '☆'}</div>
            <div class="coin-info">
                <img src="${coin.image}">
                <div>
                    <strong>${coin.symbol.toUpperCase()}</strong><br>
                    <small>${coin.name}</small>
                </div>
            </div>
            <div class="price">$${coin.current_price.toLocaleString('ru-RU')}</div>
            <div class="change ${change >= 0 ? 'up' : 'down'}">${change.toFixed(2)}%</div>
        `;
        card.onclick = (e) => { if (!e.target.closest('.star')) openModal(coin); };
        card.querySelector('.star').onclick = (e) => { e.stopPropagation(); toggleFavorite(coin.id); };
        grid.appendChild(card);
    });
}

function toggleFavorite(id) {
    favorites = favorites.includes(id) ? favorites.filter(x => x !== id) : [...favorites, id];
    localStorage.setItem("cryptoFavorites", JSON.stringify(favorites));
    renderGrid();
}

async function openModal(coin) {
    currentCoin = coin;
    document.getElementById("modal").style.display = "flex";

    document.getElementById("modalImage").src = coin.image;
    document.getElementById("modalTitle").textContent = coin.name;
    document.getElementById("modalSymbol").textContent = coin.symbol.toUpperCase();

    const change = coin.price_change_percentage_24h || 0;
    document.getElementById("modalPrice").innerHTML = `
        $${coin.current_price.toLocaleString('ru-RU')} 
        <span class="${change >= 0 ? 'up' : 'down'}" style="font-size:26px;">(${change.toFixed(2)}%)</span>
    `;

    if (chartInstance) chartInstance.destroy();
    await loadChart(coin.id, currentDays);
}

async function loadChart(coinId, days) {
    try {
        const res = await fetch(`https://api.coingecko.com/api/v3/coins/${coinId}/market_chart?vs_currency=usd&days=${days}`);
        const data = await res.json();

        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(document.getElementById("chart"), {
            type: 'line',
            data: {
                labels: data.prices.map(p => new Date(p[0]).toLocaleDateString('ru-RU')),
                datasets: [{
                    data: data.prices.map(p => p[1]),
                    borderColor: '#00ff9d',
                    borderWidth: 3.5,
                    tension: 0.25,
                    pointRadius: 0,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { intersect: false, mode: 'index' },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#1e2937',
                        titleColor: '#aaa',
                        bodyColor: '#00ff9d',
                        displayColors: false,
                        callbacks: {
                            label: (ctx) => '$' + ctx.parsed.y.toLocaleString('ru-RU')
                        }
                    }
                },
                scales: {
                    y: {
                        grid: { color: '#334155' },
                        ticks: {
                            color: '#aaa',
                            callback: value => '$' + value.toLocaleString('ru-RU')
                        }
                    },
                    x: {
                        grid: { color: '#334155' },
                        ticks: { color: '#aaa', maxTicksLimit: 10 }
                    }
                }
            }
        });
    } catch(e) { console.error(e); }
}

// Таймфреймы
document.getElementById("timeframes").addEventListener("click", e => {
    if (!e.target.classList.contains("time-btn")) return;
    document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
    e.target.classList.add('active');
    currentDays = parseInt(e.target.dataset.days);
    if (currentCoin) loadChart(currentCoin.id, currentDays);
});

function closeModal() {
    document.getElementById("modal").style.display = "none";
    if (chartInstance) chartInstance.destroy();
}

// Фильтры
document.querySelectorAll('.filters .btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filters .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const f = btn.dataset.filter;
        if (f === 'all') filteredCoins = [...allCoins];
        else if (f === 'gainers') filteredCoins = [...allCoins].sort((a,b) => (b.price_change_percentage_24h||0) - (a.price_change_percentage_24h||0));
        else if (f === 'losers') filteredCoins = [...allCoins].sort((a,b) => (a.price_change_percentage_24h||0) - (b.price_change_percentage_24h||0));
        else if (f === 'favorites') filteredCoins = allCoins.filter(c => favorites.includes(c.id));
        else if (f === 'trending') filteredCoins = [...allCoins].slice(0, 50);
        renderGrid();
    });
});

document.getElementById("search").addEventListener("input", e => {
    const term = e.target.value.toLowerCase();
    filteredCoins = allCoins.filter(c => 
        c.name.toLowerCase().includes(term) || c.symbol.toLowerCase().includes(term)
    );
    renderGrid();
});

document.getElementById("modal").addEventListener("click", e => {
    if (e.target.id === "modal") closeModal();
});

// Запуск
loadCrypto();
setInterval(loadCrypto, 300000);
</script>
</body>
</html>
